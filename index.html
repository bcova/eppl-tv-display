<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPPL Today &amp; Tomorrow</title>
<style>
  :root{
    --teal: #00707B;
    --dark-teal: #00555D;
    --pickle: #00922D;
    --light-green: #42A661;
    --dark-green: #056B06;
    --grey: #737373;
    --font-green: #29421E;
    --bg-light: #FFFFFF;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; width:100vw; height:100vh;
    overflow:hidden; background:var(--dark-teal);
    font-family: 'Georgia', 'Times New Roman', serif;
    cursor:none;
  }
  #app{ position:absolute; top:2.2vh; left:2.2vw; right:2.2vw; bottom:2.2vh; overflow:hidden; }
 
  header{
    position:absolute; top:0; left:0; right:0; height:11vh;
    background:var(--dark-teal);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 clamp(24px,3vw,60px);
    border-bottom:3px solid var(--pickle);
    z-index:10;
  }
  .brand{ display:flex; align-items:center; gap:16px; }
  .brand-badge{ background:var(--bg-light); border-radius:10px; padding:6px 16px; display:flex; align-items:center; }
  .brand-badge img{ height:clamp(30px,5.2vh,58px); width:auto; display:block; }
  .brand-sub{ color:var(--light-green); font-size:clamp(11px,1vw,16px); letter-spacing:0.14em; text-transform:uppercase; font-weight:700; }
  .clock{ text-align:right; color:var(--bg-light); }
  .clock .time{ font-size:clamp(24px,2.6vw,42px); font-weight:700; font-variant-numeric: tabular-nums; }
  .clock .date{ font-size:clamp(12px,1.1vw,18px); color:var(--light-green); letter-spacing:0.06em; }
 
  #stage{ position:absolute; top:11vh; left:0; right:0; bottom:0; }
  .layout{ display:flex; width:100%; height:100%; }
 
  .schedule-panel{
    background:var(--bg-light); display:flex; flex-direction:column; min-width:0;
    padding: clamp(16px,2.2vh,34px) clamp(20px,2.6vw,44px);
  }
  .day-view{ flex:1; position:relative; overflow:hidden; min-height:0; }
  .day-track{ display:flex; width:200%; height:100%; transition:transform 0.9s ease; }
  .day-slide{ width:50%; flex:0 0 50%; display:flex; flex-direction:column; min-width:0; box-sizing:border-box; padding-right:clamp(10px,1.5vw,20px); }
  .col-head{
    display:flex; align-items:baseline; gap:12px;
    border-bottom:3px solid var(--dark-teal); padding-bottom:8px; margin-bottom:12px;
  }
  .col-head .label{ font-size:clamp(22px,2.4vw,38px); font-weight:700; color:var(--dark-teal); letter-spacing:0.02em; }
  .col-head .count{ font-size:clamp(12px,1vw,16px); color:var(--grey); font-style:italic; }
  .events-clip{ flex:1; position:relative; overflow:hidden; }
  .events-track{ display:flex; flex-direction:column; gap:clamp(8px,1.2vh,16px); position:absolute; top:0; left:0; right:0; }
  .event{
    display:flex; gap:clamp(10px,1.2vw,20px); align-items:flex-start;
    border-left:5px solid var(--pickle); padding: 5px 0 5px clamp(10px,1.1vw,16px);
  }
  .event .time{
    flex:0 0 auto; width:clamp(70px,6.5vw,110px); color:var(--dark-teal); font-weight:700;
    font-size:clamp(13px,1.2vw,19px); line-height:1.15;
  }
  .event .info{ flex:1; min-width:0; }
  .event .pname{ font-size:clamp(15px,1.5vw,23px); font-weight:700; color:var(--font-green); line-height:1.2; }
  .event .meta{ font-size:clamp(11px,0.9vw,14px); color:var(--grey); margin-top:2px; }
  .badge{
    display:inline-block; font-size:clamp(9px,0.75vw,12px); font-weight:700;
    padding:2px 8px; border-radius:20px; margin-left:8px; letter-spacing:0.03em;
    background:var(--dark-teal); color:var(--light-green); vertical-align:middle;
  }
  .empty-note{ color:var(--grey); font-style:italic; font-size:clamp(13px,1.2vw,17px); padding:16px 0; }
 
  .promo-panel{
    flex:0 0 40%; position:relative; background:var(--dark-teal);
    border-left:3px solid var(--pickle); overflow:hidden;
  }
  .promo-slide{
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    position:relative; opacity:1; transition:opacity 0.6s ease;
  }
  .promo-slide.fade{ opacity:0; }
  .promo-slide img{
    max-width:94%; max-height:84%; object-fit:contain;
    box-shadow: 0 0 0 6px var(--pickle), 0 20px 50px rgba(0,0,0,0.5);
    border-radius:4px;
  }
  .promo-caption{
    position:absolute; left:0; right:0; bottom:0;
    background:linear-gradient(180deg, rgba(13,24,48,0) 0%, rgba(13,24,48,0.92) 45%);
    padding: 7vh clamp(16px,2.4vw,36px) clamp(16px,2.6vh,30px);
    text-align:center;
  }
  .promo-caption .pname{ color:var(--bg-light); font-size:clamp(16px,2vw,28px); font-weight:700; }
  .promo-caption .meta{ color:var(--light-green); font-size:clamp(11px,1.1vw,16px); margin-top:6px; letter-spacing:0.03em; }
 
  .updated{
    position:absolute; right:14px; bottom:8px; z-index:20;
    color:rgba(255,255,255,0.35); font-family:monospace; font-size:11px;
  }
</style>
</head>

  <div class="updated" id="updatedNote"></div>
 
</div>
 
<script>
const DATA_URL = "https://script.google.com/macros/s/AKfycbzVk4Ia52oEMijrDPUZhKmEy-5ILl-_Ygngxjyw7k5FlfgU3djhQLLLj51fvv4dH0o4bw/exec";
const REFRESH_INTERVAL_MS = 5 * 60 * 1000;   // how often to re-check the sheet (5 min)
 
const PROMO_DURATION_MS   = 9 * 1000;   // how long each promo image stays up before the next one fades in
const DAY_SWITCH_MS       = 16 * 1000;  // how long Today or Tomorrow stays up before it swipes to the other
const SCROLL_SPEED_PX_SEC = 35;         // how fast an overflowing schedule list scrolls
const SCROLL_PAUSE_MS     = 3500;       // pause at top/bottom of a scrolling list before it moves again
 
let todayEvents = [];
let tomorrowEvents = [];
let promos = [];
let promoIndex = 0;
let promoTimer = null;
let dayIndex = 0;
let dayTimer = null;
let activeColumnScrolls = [];
 
function fmtBadge(text){ return `<span class="badge">${text}</span>`; }
 
function eventRow(ev){
  let meta = [];
  if (ev.room) meta.push(ev.room);
  if (ev.ageGroup) meta.push(ev.ageGroup);
  let badges = '';
  if (String(ev.registration).toLowerCase() === 'yes') badges += fmtBadge('Registration required');
  if (String(ev.allDay).toLowerCase() === 'yes' || String(ev.allDay).toLowerCase() === 'true') badges += fmtBadge('All day');
  return `<div class="event">
      <div class="time">${ev.startTime || ''}${ev.endTime ? '&ndash;<br>' + ev.endTime : ''}</div>
      <div class="info">
        <div class="pname">${escapeHtml(ev.name)}${badges}</div>
        <div class="meta">${escapeHtml(meta.join(' · '))}</div>
      </div>
    </div>`;
}
 
function escapeHtml(s){
  return String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
 
function setupColumnScroll(clipEl){
  const track = clipEl.querySelector('.events-track');
  if (!track) return null;
  const overflow = track.scrollHeight - clipEl.clientHeight;
  if (overflow <= 4) return null;
 
  const scrollMs = Math.max(overflow / SCROLL_SPEED_PX_SEC, 4) * 1000;
  let cancelled = false;
  let timer = null;
 
  function toTop(){
    if (cancelled) return;
    track.style.transition = 'none';
    track.style.transform = 'translateY(0)';
    void track.offsetHeight;
    timer = setTimeout(toBottom, SCROLL_PAUSE_MS);
  }
  function toBottom(){
    if (cancelled) return;
    track.style.transition = `transform ${scrollMs}ms linear`;
    track.style.transform = `translateY(-${overflow}px)`;
    timer = setTimeout(() => { if (!cancelled) timer = setTimeout(toTop, SCROLL_PAUSE_MS); }, scrollMs);
  }
 
  toTop();
  return () => { cancelled = true; clearTimeout(timer); };
}
 
function buildPromoSequence(canvaList, generalList){
  const N = canvaList.length;
  const M = generalList.length;
  if (N === 0) return generalList;
  if (M === 0) return canvaList;
  const maxLen = Math.max(N, M);
  const seq = [];
  for (let i = 0; i < maxLen; i++){
    seq.push(canvaList[i % N]);
    seq.push(generalList[i % M]);
  }
  return seq;
}
 
function renderPromoPanel(){
  const panel = document.getElementById('promoPanel');
  if (!panel) return;
  const ev = promos[promoIndex];
  if (!ev) return;
  let captionHtml = '';
  if (!ev.isGeneral){
    const when = (ev.day === 'today' ? 'Today' : 'Tomorrow') + (ev.startTime ? ' · ' + ev.startTime : '');
    captionHtml = `<div class="promo-caption">
        <div class="pname">${escapeHtml(ev.name)}</div>
        <div class="meta">${escapeHtml(when)}${ev.room ? ' · ' + escapeHtml(ev.room) : ''}</div>
      </div>`;
  }
  panel.innerHTML = `<div class="promo-slide" id="promoSlideInner">
      <img src="${ev.imageUrl}" alt="${escapeHtml(ev.name || 'Library promo')}">
      ${captionHtml}
    </div>`;
}
 
function startPromoCarousel(){
  clearInterval(promoTimer);
  promoIndex = 0;
  if (promos.length === 0) return;
  renderPromoPanel();
  if (promos.length < 2) return;
  promoTimer = setInterval(() => {
    const inner = document.getElementById('promoSlideInner');
    if (inner) inner.classList.add('fade');
    setTimeout(() => {
      promoIndex = (promoIndex + 1) % promos.length;
      renderPromoPanel();
    }, 600);
  }, PROMO_DURATION_MS);
}
 
function applyDayIndex(){
  const track = document.getElementById('dayTrack');
  if (track) track.style.transform = `translateX(-${dayIndex * 50}%)`;
}
 
function startDaySwitcher(){
  clearInterval(dayTimer);
  dayIndex = 0;
  applyDayIndex();
  dayTimer = setInterval(() => {
    dayIndex = dayIndex === 0 ? 1 : 0;
    applyDayIndex();
  }, DAY_SWITCH_MS);
}
 
function renderLayout(){
  activeColumnScrolls.forEach(cleanup => cleanup());
  activeColumnScrolls = [];
  clearInterval(dayTimer);
 
  const stage = document.getElementById('stage');
  const hasPromos = promos.length > 0;
 
  stage.innerHTML = `<div class="layout">
    <div class="schedule-panel" style="flex:${hasPromos ? '1 1 28%' : '1 1 100%'};">
      <div class="day-view">
        <div class="day-track" id="dayTrack">
          <div class="day-slide">
            <div class="col-head"><span class="label">Today</span><span class="count">${todayEvents.length} program${todayEvents.length===1?'':'s'}</span></div>
            <div class="events-clip"><div class="events-track">${todayEvents.length ? todayEvents.map(eventRow).join('') : '<div class="empty-note">Nothing on the schedule today.</div>'}</div></div>
          </div>
          <div class="day-slide">
            <div class="col-head"><span class="label">Tomorrow</span><span class="count">${tomorrowEvents.length} program${tomorrowEvents.length===1?'':'s'}</span></div>
            <div class="events-clip"><div class="events-track">${tomorrowEvents.length ? tomorrowEvents.map(eventRow).join('') : '<div class="empty-note">Nothing on the schedule tomorrow.</div>'}</div></div>
          </div>
        </div>
      </div>
    </div>
    ${hasPromos ? '<div class="promo-panel" id="promoPanel"></div>' : ''}
  </div>`;
 
  setTimeout(() => {
    stage.querySelectorAll('.events-clip').forEach(clipEl => {
      const cleanup = setupColumnScroll(clipEl);
      if (cleanup) activeColumnScrolls.push(cleanup);
    });
  }, 150);
 
  startPromoCarousel();
  startDaySwitcher();
}
 
async function refreshData(){
  try{
    const res = await fetch(DATA_URL, { cache:'no-store' });
    if (!res.ok) throw new Error('bad response ' + res.status);
    const data = await res.json();
    const events = data.events || [];
    todayEvents = events.filter(e => e.day === 'today');
    tomorrowEvents = events.filter(e => e.day === 'tomorrow');
    const generalPromos = (data.generalPromos || []).map(p => ({ imageUrl: p.imageUrl, name: p.name, isGeneral: true }));
    const canvaPromos = events.filter(e => e.imageUrl);
    promos = buildPromoSequence(canvaPromos, generalPromos);
    document.getElementById('updatedNote').textContent = 'updated ' + new Date().toLocaleTimeString();
    renderLayout();
  }catch(err){
    const note = document.getElementById('updatedNote');
    note.textContent = 'last successful update: ' + (note.textContent.replace('updated ','').replace(/ \(refresh failed\)$/,'') || 'never') + ' (refresh failed)';
    console.error('Kiosk data refresh failed:', err);
  }
}
 
function tickClock(){
  const now = new Date();
  document.getElementById('clockTime').textContent = now.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
  document.getElementById('clockDate').textContent = now.toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'});
}
 
tickClock();
setInterval(tickClock, 1000);
refreshData();
setInterval(refreshData, REFRESH_INTERVAL_MS);
</script>
</body>
</html>
