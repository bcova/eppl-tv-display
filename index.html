<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPPL Today &amp; Tomorrow</title>
<style>
  :root{
    --surface-bg: #EBF2F1;
    --surface-card: #FFFFFF;
    --teal: #00707B;
    --dark-teal: #00555D;
    --pickle: #00922D;
    --light-green: #42A661;
    --dark-green: #056B06;
    --grey: #737373;
    --font-green: #29421E;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.13), 0 1px 2px rgba(0,0,0,.09);
    --shadow-md: 0 6px 18px rgba(0,0,0,.16), 0 2px 5px rgba(0,0,0,.10);
    --shadow-lg: 0 14px 32px rgba(0,0,0,.28);
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; width:100vw; height:100vh;
    overflow:hidden; background:var(--dark-teal);
    font-family: 'Georgia', 'Times New Roman', serif;
    cursor:none;
  }
  #app{ position:absolute; top:2.2vh; left:2.2vw; right:2.2vw; bottom:2.2vh; overflow:hidden; }

  /* ---------- app bar ---------- */
  .appbar{
    position:absolute; top:0; left:0; right:0; height:11vh;
    background: linear-gradient(120deg, var(--dark-teal) 0%, var(--teal) 100%);
    border-radius: 0 0 22px 22px;
    box-shadow: var(--shadow-md);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 clamp(24px,3vw,56px);
    z-index:10;
  }
  .brand{ display:flex; align-items:center; }
  .brand img{ height:clamp(28px,5.2vh,56px); width:auto; display:block; }

  .weather{ display:flex; align-items:center; gap:clamp(8px,1vw,16px); color:var(--surface-card); }
  .weather-icon{ width:clamp(30px,3.4vw,48px); height:clamp(30px,3.4vw,48px); color:var(--surface-card); flex:0 0 auto; }
  .weather-icon svg{ width:100%; height:100%; display:block; }
  .weather-text .temp{ font-size:clamp(20px,2.3vw,36px); font-weight:700; line-height:1; }
  .weather-text .desc{ font-size:clamp(10px,0.9vw,14px); color:var(--light-green); text-transform:uppercase; letter-spacing:0.06em; margin-top:2px; }

  .clock{ text-align:right; color:var(--surface-card); }
  .clock .time{ font-size:clamp(22px,2.6vw,42px); font-weight:700; font-variant-numeric: tabular-nums; line-height:1; }
  .clock .date{ font-size:clamp(11px,1.05vw,17px); color:var(--light-green); letter-spacing:0.06em; margin-top:4px; }

  /* ---------- stage: two cards side by side ---------- */
  #stage{
    position:absolute; top: calc(11vh + 2.2vh); left:0; right:0; bottom:0;
    display:flex; gap: clamp(14px,1.8vw,28px);
  }

  .schedule-card{
    flex:0 0 28%; background:var(--surface-card); border-radius:20px; box-shadow:var(--shadow-md);
    display:flex; flex-direction:column; min-width:0; overflow:hidden;
    padding: clamp(14px,2vh,28px) clamp(16px,2vw,30px);
  }
  .schedule-card.full{ flex:1 1 100%; }

  .day-view{ flex:1; position:relative; overflow:hidden; min-height:0; }
  .day-track{ display:flex; width:200%; height:100%; transition:transform 0.9s cubic-bezier(.4,0,.2,1); }
  .day-slide{ width:50%; flex:0 0 50%; display:flex; flex-direction:column; min-width:0; box-sizing:border-box; padding-right:clamp(8px,1.3vw,18px); }

  .col-head{ display:flex; align-items:center; gap:10px; padding-bottom:10px; margin-bottom:12px; }
  .col-head .dot{ width:10px; height:10px; border-radius:50%; background:var(--pickle); flex:0 0 auto; }
  .col-head .label{ font-size:clamp(20px,2.2vw,34px); font-weight:700; color:var(--dark-teal); letter-spacing:0.01em; }
  .col-head .count{ font-size:clamp(11px,0.95vw,15px); color:var(--grey); font-style:italic; margin-left:auto; }

  .events-clip{ flex:1; position:relative; overflow:hidden; }
  .events-track{ display:flex; flex-direction:column; gap:clamp(9px,1.2vh,15px); position:absolute; top:0; left:0; right:0; }

  .event{
    position:relative; display:flex; gap:clamp(10px,1.2vw,18px); align-items:flex-start;
    background:var(--surface-bg); border-radius:14px; box-shadow:var(--shadow-sm);
    padding: clamp(8px,1.1vh,13px) clamp(12px,1.3vw,18px) clamp(8px,1.1vh,13px) clamp(20px,2vw,28px);
  }
  .event::before{
    content:''; position:absolute; left:9px; top:10px; bottom:10px; width:4px;
    border-radius:4px; background:var(--pickle);
  }
  .event .time{
    flex:0 0 auto; width:clamp(66px,6.2vw,104px); color:var(--dark-teal); font-weight:700;
    font-size:clamp(12px,1.15vw,18px); line-height:1.2;
  }
  .event .info{ flex:1; min-width:0; }
  .event .pname{ font-size:clamp(16px,1.65vw,26px); font-weight:700; color:var(--font-green); line-height:1.25; }
  .event .meta{ font-size:clamp(10px,0.88vw,13px); color:var(--grey); margin-top:3px; }
  .chips{ margin-top:7px; display:flex; flex-wrap:wrap; gap:6px; }
  .badge{
    display:inline-flex; align-items:center; gap:5px; font-size:clamp(11px,1vw,16px); font-weight:700;
    padding:4px 13px; border-radius:999px; letter-spacing:0.02em; color:#fff;
  }
  .badge svg{ display:block; flex:0 0 auto; }
  .badge.reg{ background:var(--pickle); box-shadow:0 2px 7px rgba(0,146,45,0.4); }
  .badge.allday{ background:var(--teal); }
  .empty-note{ color:var(--grey); font-style:italic; font-size:clamp(13px,1.15vw,17px); padding:14px 0; }

  /* ---------- promo card ---------- */
  .promo-card{
    flex:1 1 72%; position:relative; background:var(--dark-teal);
    border-radius:20px; box-shadow:var(--shadow-md); overflow:hidden;
  }
  .promo-slide{
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    position:relative; opacity:1; transition:opacity 0.6s ease; box-sizing:border-box;
    padding:clamp(18px,3vh,44px);
  }
  .promo-slide.fade{ opacity:0; }
  .promo-slide img{
    max-width:100%; max-height:100%; object-fit:contain;
    border-radius:16px; box-shadow: var(--shadow-lg);
  }
  .promo-caption{
    position:absolute; left:0; right:0; bottom:0;
    background:linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,20,22,0.86) 55%);
    padding: 8vh clamp(20px,2.6vw,40px) clamp(18px,2.8vh,32px);
    text-align:center;
  }
  .promo-caption .pname{ color:var(--surface-card); font-size:clamp(17px,2.1vw,32px); font-weight:700; }
  .promo-caption .meta{ color:var(--light-green); font-size:clamp(11px,1.15vw,17px); margin-top:6px; letter-spacing:0.03em; }

  .updated{
    position:absolute; right:14px; bottom:8px; z-index:20;
    color:rgba(255,255,255,0.35); font-family:monospace; font-size:11px;
  }
</style>
</head>

<script>
const DATA_URL = "https://script.google.com/macros/s/AKfycbwFNj5boBOAZsMjdSunED4iNvlS7XyY6o-X3mZtWSv2YQ4Lf-6_qnCr9l5GSeCsWZyEZQ/exec";
const REFRESH_INTERVAL_MS = 5 * 60 * 1000;   // how often to re-check the sheet

const PROMO_DURATION_MS   = 9 * 1000;   // how long each promo image stays up before the next one fades in
const DAY_SWITCH_MS       = 16 * 1000;  // how long Today or Tomorrow stays up before it swipes to the other
const SCROLL_SPEED_PX_SEC = 35;         // how fast an overflowing schedule list scrolls
const SCROLL_PAUSE_MS     = 3500;       // pause at top/bottom of a scrolling list before it moves again

let todayEvents = [];
let tomorrowEvents = [];
let promos = [];
let promoIndex = 0;
let promoTimer = null;
let dayIndex = 0;
let dayTimer = null;
let dayScrollCleanups = [null, null];

function fmtBadge(text, kind){
  const icon = kind === 'reg'
    ? '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7.5v5.5M12 16v.01"/></svg>'
    : '';
  return `<span class="badge ${kind}">${icon}${text}</span>`;
}

function eventRow(ev){
  let meta = [];
  if (ev.room && ev.room.toString().trim().toUpperCase() !== 'N/A') meta.push(ev.room);
  if (ev.ageGroup) meta.push(ev.ageGroup);
  let badges = '';
  if (String(ev.registration).toLowerCase() === 'yes') badges += fmtBadge('Registration required', 'reg');
  const isAllDay = String(ev.allDay).toLowerCase() === 'yes' || String(ev.allDay).toLowerCase() === 'true';
  const timeHtml = isAllDay ? 'All day' : `${ev.startTime || ''}${ev.endTime ? '&ndash;<br>' + ev.endTime : ''}`;
  return `<div class="event">
      <div class="time">${timeHtml}</div>
      <div class="info">
        <div class="pname">${escapeHtml(ev.name)}</div>
        <div class="meta">${escapeHtml(meta.join(' · '))}</div>
        ${badges ? `<div class="chips">${badges}</div>` : ''}
      </div>
    </div>`;
}

function escapeHtml(s){
  return String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function setupColumnScroll(clipEl){
  const track = clipEl.querySelector('.events-track');
  if (!track) return null;
  const overflow = track.scrollHeight - clipEl.clientHeight;
  if (overflow <= 4) return null;

  const scrollMs = Math.max(overflow / SCROLL_SPEED_PX_SEC, 4) * 1000;
  let cancelled = false;
  let timer = null;

  function toTop(){
    if (cancelled) return;
    track.style.transition = 'none';
    track.style.transform = 'translateY(0)';
    void track.offsetHeight;
    timer = setTimeout(toBottom, SCROLL_PAUSE_MS);
  }
  function toBottom(){
    if (cancelled) return;
    track.style.transition = `transform ${scrollMs}ms linear`;
    track.style.transform = `translateY(-${overflow}px)`;
    timer = setTimeout(() => { if (!cancelled) timer = setTimeout(toTop, SCROLL_PAUSE_MS); }, scrollMs);
  }

  toTop();
  return () => { cancelled = true; clearTimeout(timer); };
}

function activateDayScroll(index){
  const stage = document.getElementById('stage');
  const slides = stage.querySelectorAll('.day-slide');
  const clipEl = slides[index] ? slides[index].querySelector('.events-clip') : null;
  if (!clipEl) return;
  const cleanup = setupColumnScroll(clipEl);
  if (cleanup) dayScrollCleanups[index] = cleanup;
}

function deactivateDayScroll(index){
  if (dayScrollCleanups[index]) {
    dayScrollCleanups[index]();
    dayScrollCleanups[index] = null;
  }
  const stage = document.getElementById('stage');
  const slides = stage.querySelectorAll('.day-slide');
  const clipEl = slides[index] ? slides[index].querySelector('.events-clip') : null;
  if (clipEl) {
    const track = clipEl.querySelector('.events-track');
    if (track) { track.style.transition = 'none'; track.style.transform = 'translateY(0)'; }
  }
}

function applyDayIndex(){
  const track = document.getElementById('dayTrack');
  if (track) track.style.transform = `translateX(-${dayIndex * 50}%)`;
  deactivateDayScroll(dayIndex === 0 ? 1 : 0);
  activateDayScroll(dayIndex);
}

function startDaySwitcher(){
  clearInterval(dayTimer);
  dayScrollCleanups.forEach(cleanup => { if (cleanup) cleanup(); });
  dayScrollCleanups = [null, null];
  dayIndex = 0;
  applyDayIndex();
  dayTimer = setInterval(() => {
    dayIndex = dayIndex === 0 ? 1 : 0;
    applyDayIndex();
  }, DAY_SWITCH_MS);
}

function buildPromoSequence(canvaList, generalList){
  const N = canvaList.length;
  const M = generalList.length;
  if (N === 0) return generalList;
  if (M === 0) return canvaList;
  const maxLen = Math.max(N, M);
  const seq = [];
  for (let i = 0; i < maxLen; i++){
    seq.push(canvaList[i % N]);
    seq.push(generalList[i % M]);
  }
  return seq;
}

function renderPromoPanel(){
  const panel = document.getElementById('promoPanel');
  if (!panel) return;
  const ev = promos[promoIndex];
  if (!ev) return;
  let captionHtml = '';
  if (!ev.isGeneral){
    const when = (ev.day === 'today' ? 'Today' : 'Tomorrow') + (ev.startTime ? ' · ' + ev.startTime : '');
    captionHtml = `<div class="promo-caption">
        <div class="pname">${escapeHtml(ev.name)}</div>
        <div class="meta">${escapeHtml(when)}${ev.room ? ' · ' + escapeHtml(ev.room) : ''}</div>
      </div>`;
  }
  panel.innerHTML = `<div class="promo-slide" id="promoSlideInner">
      <img src="${ev.imageUrl}" alt="${escapeHtml(ev.name || 'Library promo')}">
      ${captionHtml}
    </div>`;
}

function startPromoCarousel(){
  clearInterval(promoTimer);
  promoIndex = 0;
  if (promos.length === 0) return;
  renderPromoPanel();
  if (promos.length < 2) return;
  promoTimer = setInterval(() => {
    const inner = document.getElementById('promoSlideInner');
    if (inner) inner.classList.add('fade');
    setTimeout(() => {
      promoIndex = (promoIndex + 1) % promos.length;
      renderPromoPanel();
    }, 600);
  }, PROMO_DURATION_MS);
}

function renderLayout(){
  clearInterval(dayTimer);
  dayScrollCleanups.forEach(cleanup => { if (cleanup) cleanup(); });
  dayScrollCleanups = [null, null];

  const stage = document.getElementById('stage');
  const hasPromos = promos.length > 0;

  stage.innerHTML = `
    <div class="schedule-card${hasPromos ? '' : ' full'}">
      <div class="day-view">
        <div class="day-track" id="dayTrack">
          <div class="day-slide">
            <div class="col-head"><span class="dot"></span><span class="label">Today</span><span class="count">${todayEvents.length} program${todayEvents.length===1?'':'s'}</span></div>
            <div class="events-clip"><div class="events-track">${todayEvents.length ? todayEvents.map(eventRow).join('') : '<div class="empty-note">Nothing on the schedule today.</div>'}</div></div>
          </div>
          <div class="day-slide">
            <div class="col-head"><span class="dot"></span><span class="label">Tomorrow</span><span class="count">${tomorrowEvents.length} program${tomorrowEvents.length===1?'':'s'}</span></div>
            <div class="events-clip"><div class="events-track">${tomorrowEvents.length ? tomorrowEvents.map(eventRow).join('') : '<div class="empty-note">Nothing on the schedule tomorrow.</div>'}</div></div>
          </div>
        </div>
      </div>
    </div>
    ${hasPromos ? '<div class="promo-card"><div class="promo-panel" id="promoPanel" style="width:100%;height:100%;position:relative;"></div></div>' : ''}
  `;

  startPromoCarousel();
  setTimeout(startDaySwitcher, 150);
}

async function refreshData(){
  try{
    const res = await fetch(DATA_URL, { cache:'no-store' });
    if (!res.ok) throw new Error('bad response ' + res.status);
    const data = await res.json();
    const events = data.events || [];
    todayEvents = events.filter(e => e.day === 'today');
    tomorrowEvents = events.filter(e => e.day === 'tomorrow');
    const generalPromos = (data.generalPromos || []).map(p => ({ imageUrl: p.imageUrl, name: p.name, isGeneral: true }));
    const canvaPromos = events.filter(e => e.imageUrl);
    promos = buildPromoSequence(canvaPromos, generalPromos);
    document.getElementById('updatedNote').textContent = 'updated ' + new Date().toLocaleTimeString();
    renderLayout();
  }catch(err){
    const note = document.getElementById('updatedNote');
    note.textContent = 'last successful update: ' + (note.textContent.replace('updated ','').replace(/ \(refresh failed\)$/,'') || 'never') + ' (refresh failed)';
    console.error('Kiosk data refresh failed:', err);
  }
}

function tickClock(){
  const now = new Date();
  document.getElementById('clockTime').textContent = now.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
  document.getElementById('clockDate').textContent = now.toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'});
}

/* ---------- weather ---------- */
const WEATHER_LAT = 41.9236;
const WEATHER_LON = -87.8166;
const WEATHER_REFRESH_MS = 20 * 60 * 1000;

const WEATHER_INFO = {
  clear:      { label: 'Clear',          icon: 'sun' },
  mostly:     { label: 'Mostly Clear',   icon: 'sun' },
  partly:     { label: 'Partly Cloudy',  icon: 'partly' },
  cloudy:     { label: 'Cloudy',         icon: 'cloud' },
  fog:        { label: 'Foggy',          icon: 'fog' },
  drizzle:    { label: 'Drizzle',        icon: 'rain' },
  rain:       { label: 'Rain',           icon: 'rain' },
  freezing:   { label: 'Freezing Rain',  icon: 'rain' },
  snow:       { label: 'Snow',           icon: 'snow' },
  thunder:    { label: 'Thunderstorm',   icon: 'thunder' }
};

function weatherCategory(code){
  if (code === 0) return 'clear';
  if (code === 1) return 'mostly';
  if (code === 2) return 'partly';
  if (code === 3) return 'cloudy';
  if (code === 45 || code === 48) return 'fog';
  if ([51,53,55,56,57].includes(code)) return 'drizzle';
  if ([61,63,65,80,81,82].includes(code)) return 'rain';
  if ([66,67].includes(code)) return 'freezing';
  if ([71,73,75,77,85,86].includes(code)) return 'snow';
  if ([95,96,99].includes(code)) return 'thunder';
  return 'cloudy';
}

const WEATHER_ICON_SVGS = {
  sun: '<svg viewBox="0 0 24 24" fill="none"><g stroke="#FFC94D" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="4.3"/><path d="M12 2.2v2.4M12 19.4v2.4M4.1 4.1l1.7 1.7M18.2 18.2l1.7 1.7M2.2 12h2.4M19.4 12h2.4M4.1 19.9l1.7-1.7M18.2 5.8l1.7-1.7"/></g></svg>',
  partly: '<svg viewBox="0 0 24 24" fill="none"><g stroke="#FFC94D" stroke-width="1.9" stroke-linecap="round"><circle cx="8.3" cy="8" r="3.1"/><path d="M8.3 2.3v1.6M3.4 4.4l1.2 1.2M2 8.3h1.6"/></g><path d="M9 17.7h8a3.6 3.6 0 0 0 .4-7.18A4.9 4.9 0 0 0 8.3 9.5 4 4 0 0 0 9 17.7Z" fill="#E7EDEC" stroke="#E7EDEC" stroke-width="1.6" stroke-linejoin="round"/></svg>',
  cloud: '<svg viewBox="0 0 24 24"><path d="M7 18h10a4 4 0 0 0 .5-7.97A5.5 5.5 0 0 0 7.1 9.1 4.5 4.5 0 0 0 7 18Z" fill="#E7EDEC" stroke="#E7EDEC" stroke-width="1.6" stroke-linejoin="round"/></svg>',
  fog: '<svg viewBox="0 0 24 24"><path d="M7 12.5h10a4 4 0 0 0 .4-7.98A5.5 5.5 0 0 0 7.1 5.6 4.5 4.5 0 0 0 7 12.5Z" fill="#C7D2D1" stroke="#C7D2D1" stroke-width="1.6" stroke-linejoin="round"/><g stroke="#C7D2D1" stroke-width="1.8" stroke-linecap="round"><path d="M5 16.3h14M7 20h10"/></g></svg>',
  rain: '<svg viewBox="0 0 24 24"><path d="M7 12.5h10a4 4 0 0 0 .4-7.98A5.5 5.5 0 0 0 7.1 5.6 4.5 4.5 0 0 0 7 12.5Z" fill="#E7EDEC" stroke="#E7EDEC" stroke-width="1.6" stroke-linejoin="round"/><g stroke="#5AC8FA" stroke-width="1.9" stroke-linecap="round"><path d="M8.3 16.8 7.2 19.6M13 16.8l-1.1 2.8M17.7 16.8l-1.1 2.8"/></g></svg>',
  snow: '<svg viewBox="0 0 24 24"><path d="M7 12.5h10a4 4 0 0 0 .4-7.98A5.5 5.5 0 0 0 7.1 5.6 4.5 4.5 0 0 0 7 12.5Z" fill="#E7EDEC" stroke="#E7EDEC" stroke-width="1.6" stroke-linejoin="round"/><g fill="#BEE3F5"><circle cx="8.5" cy="17.8" r="1.1"/><circle cx="12.5" cy="19.4" r="1.1"/><circle cx="16" cy="17.8" r="1.1"/></g></svg>',
  thunder: '<svg viewBox="0 0 24 24"><path d="M7 11.5h10a4 4 0 0 0 .4-7.98A5.5 5.5 0 0 0 7.1 4.6 4.5 4.5 0 0 0 7 11.5Z" fill="#C7D2D1" stroke="#C7D2D1" stroke-width="1.6" stroke-linejoin="round"/><path d="M13 11.8 10 16.5h3l-2 4.7 6-7.2h-3.3l1.8-2.2Z" fill="#FFD54F"/></svg>'
};

async function refreshWeather(){
  try{
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_LAT}&longitude=${WEATHER_LON}&current=temperature_2m,weather_code&temperature_unit=fahrenheit&timezone=America%2FChicago`;
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error('weather fetch failed');
    const data = await res.json();
    const temp = Math.round(data.current.temperature_2m);
    const cat = weatherCategory(data.current.weather_code);
    const info = WEATHER_INFO[cat];
    document.getElementById('weatherTemp').textContent = temp + '°F';
    document.getElementById('weatherDesc').textContent = info.label;
    document.getElementById('weatherIcon').innerHTML = WEATHER_ICON_SVGS[info.icon];
  }catch(err){
    console.error('Weather refresh failed:', err);
  }
}

tickClock();
setInterval(tickClock, 1000);
refreshWeather();
setInterval(refreshWeather, WEATHER_REFRESH_MS);
refreshData();
setInterval(refreshData, REFRESH_INTERVAL_MS);
</script>
